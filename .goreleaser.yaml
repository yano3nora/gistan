# goreleaser には compile / archive / checksum / GitHub Release 作成だけを任せる。
# version bump・check/test・tag 付け・人間による publish ゲートは scripts/release.ts 側に残す。
# 他プロジェクト (Rust 等) へ横展開するときは builds セクションを差し替えるだけでよい。
# https://goreleaser.com/customization/builds/deno/
version: 2

project_name: gistan

builds:
  - builder: deno
    main: src/main.ts
    binary: gistan
    # deno compile の permission flags。deno.json の compile task と同期させること
    flags:
      - --allow-env
      - --allow-read
      - --allow-write
      - --allow-run
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-pc-windows-msvc

archives:
  # goreleaser 導入前の asset 命名 (macos / x64) を維持する。
  # mise `github:yano3nora/gistan` の asset 解決を過去リリースと同じ形に保つため
  - name_template: >-
      {{ .ProjectName }}-v{{ .Version }}-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # archive にはバイナリのみ含める (README 等を同梱しない)。導入前の asset と同じ形
    files:
      - none*

checksum:
  algorithm: sha256
  # asset ごとに個別の .sha256 を作る。導入前の per-asset checksum と同じ形
  split: true

changelog:
  # `gh release create --generate-notes` 相当。GitHub API で release notes を自動生成する
  use: github-native
