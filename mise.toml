# https://mise.jdx.dev/
# Project-local tool versions and tasks.
# Uncomment only the parts this project actually needs.

# [settings]
# experimental = true

[tools]
deno = "2.9.1"
goreleaser = "2"

[tasks."release:prepare"]
description = "Bump VERSION, run checks/tests, and dry-run the goreleaser pipeline (no publish)"
run = "deno run --allow-read --allow-write --allow-run --allow-env scripts/release.ts prepare"

[tasks."release:publish"]
description = "Push the tagged commit and create the GitHub Release via goreleaser (human-only)"
run = "deno run --allow-read --allow-write --allow-run --allow-env scripts/release.ts publish"

